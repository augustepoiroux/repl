name: Run Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: install elan
      run: |
        set -o pipefail
        curl -sSfL https://github.com/leanprover/elan/releases/download/v3.0.0/elan-x86_64-unknown-linux-gnu.tar.gz | tar xz
        ./elan-init -y --default-toolchain none
        echo "$HOME/.elan/bin" >> $GITHUB_PATH

    - name: build
      run: lake build

    - name: Decide whether to run Mathlib tests
      run: |
        set -euo pipefail
        LEAN_VERSION="$(sed 's#^leanprover/lean4:##' lean-toolchain)"
        if git ls-remote --exit-code --tags https://github.com/leanprover-community/mathlib4.git "refs/tags/${LEAN_VERSION}" >/dev/null 2>&1; then
          echo "RUN_MATHLIB=1" >> "$GITHUB_ENV"
          echo "Mathlib tag ${LEAN_VERSION} found; Mathlib tests enabled."
        else
          echo "RUN_MATHLIB=0" >> "$GITHUB_ENV"
          echo "Mathlib tag ${LEAN_VERSION} not found; Mathlib tests disabled."
        fi

    - name: Run tests
      run: lake exe test
